services:
  - type: web
    name: brvm-trading-desk
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: DATA_DIR
        value: /data
    disk:
      name: brvm-data
      mountPath: /data
      sizeGB: 1
