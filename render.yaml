services:
  - type: web
    name: brvm-trading-desk
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHON_VERSION
        value: "3.12"
    disk:
      name: brvm-data
      mountPath: /data
      sizeGB: 1
